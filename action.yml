name: Crash Auto-Fix
description: Composite GitHub Action to auto-fix crashes using Claude Code CLI

inputs:
  crash-id:
    description: Unique Crashlytics issue id
    required: true
  signature:
    description: Exception class / crash title
    required: true
  subtitle:
    description: First line of stack trace summary
    required: false
  app-version:
    description: App version at time of crash
    required: true
  stack-trace:
    description: Full stack trace text
    required: false
  device-info:
    description: Device make/model + Android version
    required: false
  occurrence-count:
    description: How many users hit this
    required: false
  create-time:
    description: ISO 8601 timestamp
    required: true
  agent:
    description: Which coding agent to invoke (claude, aider, codex, gemini)
    required: false
    default: claude
  base-branch:
    description: Branch to fork from / target the PR at
    required: false
    default: main
  api-key:
    description: Provider API key (ANTHROPIC_API_KEY, OPENAI_API_KEY, etc.)
    required: true
  github-token:
    description: GitHub token for pushing branch and opening PR
    required: true

outputs:
  pr-url:
    description: URL of the PR opened
    value: ${{ steps.open-pr.outputs.pr-url }}
  pr-number:
    description: Number of the PR
    value: ${{ steps.open-pr.outputs.pr-number }}
  branch:
    description: Branch name that was created and pushed
    value: ${{ steps.branch.outputs.branch-name }}

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.base-branch }}

    - name: Create branch
      id: branch
      shell: bash
      run: |
        SIGNATURE_SLUG=$(echo "${{ inputs.signature }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | sed 's/-+/-/g')
        BRANCH_NAME="crash-fix/${SIGNATURE_SLUG}-${{ github.run_id }}"
        git checkout -b "$BRANCH_NAME"
        echo "branch-name=$BRANCH_NAME" >> $GITHUB_OUTPUT

    - name: Install agent CLI
      shell: bash
      run: bash action/agents/${{ inputs.agent }}/install.sh

    - name: Build prompt
      shell: bash
      env:
        CRASH_ID: ${{ inputs.crash-id }}
        SIGNATURE: ${{ inputs.signature }}
        SUBTITLE: ${{ inputs.subtitle }}
        APP_VERSION: ${{ inputs.app-version }}
        STACK_TRACE: ${{ inputs.stack-trace }}
        DEVICE_INFO: ${{ inputs.device-info }}
        OCCURRENCE_COUNT: ${{ inputs.occurrence-count }}
        CREATE_TIME: ${{ inputs.create-time }}
      run: bash action/build-prompt.sh

    - name: Run agent
      shell: bash
      env:
        AGENT_API_KEY: ${{ inputs.api-key }}
      run: bash action/agents/${{ inputs.agent }}/run.sh /tmp/crash-fix-prompt.txt /tmp/agent-output.txt

    - name: Commit changes
      shell: bash
      run: |
        git config user.email "crash-fix-action@github.com"
        git config user.name "Crash Fix Action"
        if git diff --quiet; then
          echo "No changes detected. Failing run."
          exit 1
        fi
        git add -A
        git commit -m "Fix crash: ${{ inputs.signature }}"

    - name: Push branch
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
        git push origin ${{ steps.branch.outputs.branch-name }}

    - name: Open PR
      id: open-pr
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        AGENT_OUTPUT=$(cat /tmp/agent-output.txt)
        PR_BODY=$(cat action/pr-body-template.md | sed "s|{{SIGNATURE}}|${{ inputs.signature }}|g; s|{{STACK_TRACE}}|${{ inputs.stack-trace }}|g; s|{{APP_VERSION}}|${{ inputs.app-version }}|g; s|{{AGENT_OUTPUT}}|$AGENT_OUTPUT|g")
        PR_URL=$(gh pr create --title "Fix crash: ${{ inputs.signature }}" --body "$PR_BODY" --base ${{ inputs.base-branch }} 2>&1 | grep "https://github.com")
        PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
        echo "pr-url=$PR_URL" >> $GITHUB_OUTPUT
        echo "pr-number=$PR_NUMBER" >> $GITHUB_OUTPUT
