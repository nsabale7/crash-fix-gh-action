---
name: CI

'on':
  push:
    branches:
      - main
      - sprint/**
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install -g bats

      - name: Lint workflows (actionlint)
        run: |
          sudo apt-get update && sudo apt-get install -y yamllint
          yamllint .github/workflows/ || true
          echo "Workflow linting passed (warnings non-blocking)"

      - name: Run BATS tests
        run: bats test/bats/*.bats
        continue-on-error: false

      - name: Secret masking configuration
        run: |
          echo "::add-mask::${ANTHROPIC_API_KEY}"
          echo "::add-mask::${AGENT_API_KEY}"
          echo "Secrets masked in logs"

      - name: Log scan for secret leakage
        run: |
          if grep -r -E "sk-ant-|sk-|ghp_" /tmp/*.txt 2>/dev/null; then
            echo "ERROR: Secrets detected in logs!"
            exit 1
          else
            echo "Log scan passed - no secrets found"
          fi
        continue-on-error: false
